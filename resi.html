<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resi Pengiriman Alvarendra Bookstore</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.form-box,
.resi{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    background:#000;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.resi{
    display:none;
}

/* Ukuran A6 */
@media print{
    body{
        background:white;
        margin:0;
    }

    .form-box,
    .no-print{
        display:none;
    }

    .resi{
        display:block !important;
        width:105mm;
        height:148mm;
        box-shadow:none;
        border:1px solid #000;
        padding:10mm;
        box-sizing:border-box;
        page-break-after:avoid;
    }

    @page{
        size:A6 portrait;
        margin:0;
    }
}

.header{
    display:flex;
    align-items:flex-start;
    gap:10px;
    border-bottom:2px solid #000;
    padding-bottom:10px;
}

.header img{
    width:60px;
}

.header-text h2{
    margin:0;
    font-size:18px;
}

.header-text p{
    margin:3px 0;
    font-size:12px;
}

.info{
    margin-top:20px;
}

.info p{
    margin:12px 0;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

    <div class="form-box no-print">
        <h2>Formulir Resi Pengiriman</h2>

        <div class="form-group">
            <label>Nama Penerima</label>
            <input type="text" id="nama">
        </div>

        <div class="form-group">
            <label>No Handphone</label>
            <input type="text" id="hp">
        </div>

        <div class="form-group">
            <label>Alamat Lengkap</label>
            <textarea id="alamat" rows="4"></textarea>
        </div>

        <button onclick="buatResi()">Buat Resi</button>
    </div>

    <div class="resi" id="resi">

        <div class="header">

            <img src="Logo.png" alt="Logo">

            <div class="header-text">
                <h2>Alvarendra Bookstore</h2>

                <p>
                    Jl. Gurame, RT.001/RW.004,
                    Tajurhalang, Kec. Tajur Halang,
                    Kabupaten Bogor, Jawa Barat 16320
                </p>

                <p>Telepon: 0817-5000-105</p>
            </div>

        </div>

        <div class="info">

            <p>
                <strong>Nama Penerima:</strong><br>
                <span id="hasilNama"></span>
            </p>

            <p>
                <strong>No Handphone:</strong><br>
                <span id="hasilHp"></span>
            </p>

            <p>
                <strong>Alamat Lengkap:</strong><br>
                <span id="hasilAlamat"></span>
            </p>

        </div>

        <br><br>

        <button class="no-print" onclick="window.print()">
            Cetak Resi A6
        </button>

    </div>

</div>

<script>
function buatResi(){

    document.getElementById("hasilNama").innerText =
        document.getElementById("nama").value;

    document.getElementById("hasilHp").innerText =
        document.getElementById("hp").value;

    document.getElementById("hasilAlamat").innerText =
        document.getElementById("alamat").value;

    document.getElementById("resi").style.display = "block";

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    });
}
</script>

</body>
</html>
